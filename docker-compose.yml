services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      FLASK_PORT: "5050"
      # Use MONGO from .env for Atlas, fallback = Compose Mongo service
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/airktm}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - flask_data:/app/data
      - flask_forecasts:/app/forecasts

  web:
    build:
      context: .
      dockerfile: Dockerfile.node
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/airktm}
      JWT_SECRET: ${JWT_SECRET:-docker-local-change-for-production}
      SESSION_SECRET: ${SESSION_SECRET:-docker-session-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      - mongo
      - flask

volumes:
  mongo_data:
  flask_data:
  flask_forecasts:
